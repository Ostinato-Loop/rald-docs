<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary meta -->
    <title>RALD Learn — Ecosystem Knowledge Center</title>
    <meta name="description" content="The permanent knowledge center for the RALD ecosystem. Learn about every product, how identity and privacy work, and how to build on RALD. Not a blog — a structured knowledge platform." />
    <meta name="robots" content="index, follow, max-snippet:-1, max-image-preview:large, max-video-preview:-1" />
    <meta name="author" content="RALD · LILCKY STUDIO LIMITED" />
    <meta name="language" content="English" />
    <meta name="geo.region" content="NG" />
    <meta name="geo.country" content="Nigeria" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="RALD Learn — Ecosystem Knowledge Center" />
    <meta property="og:description" content="The permanent knowledge center for the RALD ecosystem. Every product, every policy, every privacy and security commitment — documented." />
    <meta property="og:url" content="https://learn.rald.cloud/" />
    <meta property="og:site_name" content="RALD Learn" />
    <meta property="og:image" content="https://learn.rald.cloud/og-image.png" />
    <meta property="og:locale" content="en_US" />

    <!-- Twitter / X Cards -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@raldcloud" />
    <meta name="twitter:title" content="RALD Learn — Ecosystem Knowledge Center" />
    <meta name="twitter:description" content="The permanent knowledge center for the RALD ecosystem. Products, security, privacy, AI, verification — all documented." />
    <meta name="twitter:image" content="https://learn.rald.cloud/og-image.png" />

    <!-- Canonical -->
    <link rel="canonical" href="https://learn.rald.cloud/" />

    <!-- Sitemap & AI guide -->
    <link rel="sitemap" type="application/xml" href="/sitemap.xml" />

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='8' fill='%23050A0F'/><text x='16' y='22' text-anchor='middle' font-size='18' font-weight='900' fill='url(%23g)' font-family='system-ui'>R</text><defs><linearGradient id='g' x1='0' y1='0' x2='1' y2='1'><stop offset='0%25' stop-color='%2300FF88'/><stop offset='100%25' stop-color='%230066FF'/></linearGradient></defs></svg>" />

    <!-- JSON-LD: Organization + WebSite -->
    <script type="application/ld+json">
    [
      {
        "@context": "https://schema.org",
        "@type": "Organization",
        "name": "RALD",
        "url": "https://rald.cloud",
        "logo": "https://rald.cloud/rald-logo.png",
        "description": "Pan-African digital infrastructure — identity, commerce, payments, and communications for Africa.",
        "foundingDate": "2024",
        "areaServed": "Africa",
        "contactPoint": [
          { "@type": "ContactPoint", "contactType": "customer support", "email": "contact@rald.cloud" },
          { "@type": "ContactPoint", "contactType": "privacy", "email": "privacy@rald.cloud" },
          { "@type": "ContactPoint", "contactType": "security", "email": "security@rald.cloud" }
        ],
        "sameAs": [
          "https://learn.rald.cloud",
          "https://trust.rald.cloud",
          "https://status.rald.cloud",
          "https://app.rald.cloud"
        ]
      },
      {
        "@context": "https://schema.org",
        "@type": "WebSite",
        "name": "RALD Learn",
        "url": "https://learn.rald.cloud",
        "description": "The permanent knowledge center for the RALD ecosystem.",
        "publisher": { "@type": "Organization", "name": "RALD" },
        "potentialAction": {
          "@type": "SearchAction",
          "target": { "@type": "EntryPoint", "urlTemplate": "https://learn.rald.cloud/search?q={search_term_string}" },
          "query-input": "required name=search_term_string"
        }
      }
    ]
    </script>

    <!-- Inter font -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
